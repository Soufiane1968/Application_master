<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOBEMAT — Ajouter un véhicule</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <header>
        <div class="header-logo">
            <img src="{{ url_for('static', filename='logo_sobemat.png') }}" height="70" alt="SOBEMAT">
            <span>Ajouter un véhicule</span>
        </div>
        <a href="/" class="btn-retour">← Retour</a>
    </header>


    <main>
        <div class="formulaire">
            <h2>Informations du véhicule</h2>
            <form method="POST" action="/ajouter">

                <div class="form-groupe">
                    <label>Marque</label>
                    <select name="marque">
                        {% for m in marques %}
                        <option value="{{ m[0] }}">{{ m[0] }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-groupe">
                    <label>Modèle</label>
                    <select name="modele">
                        {% for m in modeles %}
                        <option value="{{ m[0] }}">{{ m[0] }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-ligne">
                    <div class="form-groupe">
                        <label>Année</label>
                        <select name="annee">
                            {% for a in range(2026, 2000, -1) %}
                            <option value="{{ a }}">{{ a }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-groupe">
                        <label>Kilométrage</label>
                        <input type="number" name="km" placeholder="Ex: 85000" required>
                    </div>
                </div>

                <div class="form-ligne">
                    <div class="form-groupe">
                        <label>Moteur</label>
                        <select name="moteur">
                            {% for m in moteurs %}
                            <option value="{{ m[0] }}">{{ m[0] }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-groupe">
                        <label>Couleur</label>
                        <select name="couleur">
                            {% for c in couleurs %}
                            <option value="{{ c[0] }}">{{ c[0] }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="form-ligne">
                    <div class="form-groupe">
                        <label>Prix (€)</label>
                        <input type="number" name="prix" placeholder="Ex: 18500" required>
                    </div>
                    <div class="form-groupe">
                        <label>État</label>
                        <select name="etat">
                            {% for e in etats %}
                            <option value="{{ e[0] }}">{{ e[0] }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="form-groupe">
                    <label>Dernière révision</label>
                    <input type="text" name="revision" placeholder="Ex: Janvier 2024">
                </div>
                <div class="form-groupe">
                    <label>Boîte de vitesse</label>
                    <select name="boite">
                        {% for b in boites %}
                        <option value="{{ b[0] }}">{{ b[0] }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-groupe">
                    <label>Puissance (CV)</label>
                    <input type="number" name="puissance" placeholder="Ex: 130">
                </div>
                <div class="form-groupe">
                    <label>Options & Équipements</label>
                    <textarea name="equipements" rows="5"
                        placeholder="Ex: Caméra de recul, Climatisation automatique, GPS, Régulateur de vitesse..."
                        style="width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:14px; resize:vertical;"></textarea>
                </div>

                <button type="submit" class="btn-submit">
                    ✅ Enregistrer
                </button>

            </form>
        </div>
    </main>

</body>

</html>
